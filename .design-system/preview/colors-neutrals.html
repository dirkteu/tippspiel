<!DOCTYPE html>
<html lang="de"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg);padding:24px;font-family:var(--font-sans)}
  .ramp{display:flex;border-radius:10px;overflow:hidden;border:1px solid var(--border-soft)}
  .sw{flex:1;height:64px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px}
  .sw span{font-family:var(--font-mono);font-size:10px}
  .labels{display:flex;margin-top:8px}
  .labels div{flex:1;text-align:center;font-family:var(--font-mono);font-size:10px;color:var(--fg4)}
</style></head>
<body>
  <div class="ramp">
    <div class="sw" style="background:#020617"><span style="color:#94a3b8">950</span></div>
    <div class="sw" style="background:#0f172a"><span style="color:#94a3b8">900</span></div>
    <div class="sw" style="background:#182234"><span style="color:#94a3b8">850</span></div>
    <div class="sw" style="background:#1e293b"><span style="color:#cbd5e1">800</span></div>
    <div class="sw" style="background:#334155"><span style="color:#e2e8f0">700</span></div>
    <div class="sw" style="background:#475569"><span style="color:#f1f5f9">600</span></div>
    <div class="sw" style="background:#64748b"><span style="color:#0f172a">500</span></div>
    <div class="sw" style="background:#94a3b8"><span style="color:#0f172a">400</span></div>
    <div class="sw" style="background:#cbd5e1"><span style="color:#0f172a">300</span></div>
    <div class="sw" style="background:#f8fafc"><span style="color:#0f172a">50</span></div>
  </div>
  <div class="labels">
    <div>#020617</div><div>bg</div><div>elev</div><div>surface</div><div>border</div><div>tile</div><div></div><div>muted</div><div></div><div>text</div>
  </div>
</body></html>
