<!DOCTYPE html>
<html lang="de"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg);font-family:var(--font-sans);padding:24px;color:var(--fg1)}
  .row{display:flex;align-items:baseline;gap:16px;padding:10px 0;border-bottom:1px solid var(--divider)}
  .row:last-child{border-bottom:0}
  .spec{font-family:var(--font-display);color:var(--fg1)}
  .meta{margin-left:auto;font-family:var(--font-mono);font-size:12px;color:var(--fg4)}
  .score{font-family:var(--font-display);font-weight:700;font-variant-numeric:tabular-nums}
</style></head>
<body>
  <div class="row"><span class="score" style="font-size:48px;letter-spacing:-.02em">2 : 1</span><span class="meta">score · 48 / 700 · tabular</span></div>
  <div class="row"><span class="spec" style="font-size:36px;font-weight:700;letter-spacing:-.02em">Spieltag 1</span><span class="meta">display · 36 / 700</span></div>
  <div class="row"><span class="spec" style="font-size:24px;font-weight:700;letter-spacing:-.02em">Dein geheimer Partner</span><span class="meta">h1 · 24 / 700</span></div>
  <div class="row"><span class="score" style="font-size:20px;font-weight:600;color:var(--green-400)">+3</span><span class="meta">points · Oswald 600</span></div>
</body></html>
