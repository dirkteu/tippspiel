<!DOCTYPE html>
<html lang="de"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg);padding:24px;font-family:var(--font-sans)}
  .grid{display:flex;gap:16px;align-items:flex-end}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{background:var(--surface);border:1px solid var(--border);border-bottom:2px solid var(--accent)}
  .nm{font-family:var(--font-mono);font-size:11px;color:var(--fg3)}
  .px{font-family:var(--font-mono);font-size:10px;color:var(--fg4)}
</style></head>
<body>
  <div class="grid">
    <div class="item"><div class="box" style="width:64px;height:64px;border-radius:4px"></div><span class="nm">xs</span><span class="px">4px</span></div>
    <div class="item"><div class="box" style="width:64px;height:64px;border-radius:8px"></div><span class="nm">sm</span><span class="px">8px · tiles</span></div>
    <div class="item"><div class="box" style="width:64px;height:64px;border-radius:12px"></div><span class="nm">md</span><span class="px">12px · btn</span></div>
    <div class="item"><div class="box" style="width:64px;height:64px;border-radius:16px"></div><span class="nm">lg</span><span class="px">16px · card</span></div>
    <div class="item"><div class="box" style="width:64px;height:64px;border-radius:24px"></div><span class="nm">xl</span><span class="px">24px · sheet</span></div>
    <div class="item"><div class="box" style="width:64px;height:64px;border-radius:999px"></div><span class="nm">full</span><span class="px">pill</span></div>
  </div>
</body></html>
