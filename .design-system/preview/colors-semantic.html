<!DOCTYPE html>
<html lang="de"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg);padding:24px;font-family:var(--font-sans)}
  .grid{display:flex;gap:10px}
  .sw{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px}
  .chip{width:100%;height:48px;border-radius:10px}
  .nm{font-size:12px;color:var(--fg2);font-weight:500}
  .hx{font-family:var(--font-mono);font-size:10px;color:var(--fg4)}
</style></head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#10b981"></div><span class="nm">Win</span><span class="hx">#10b981</span></div>
    <div class="sw"><div class="chip" style="background:#f59e0b"></div><span class="nm">Draw</span><span class="hx">#f59e0b</span></div>
    <div class="sw"><div class="chip" style="background:#f43f5e"></div><span class="nm">Loss</span><span class="hx">#f43f5e</span></div>
    <div class="sw"><div class="chip" style="background:#38bdf8"></div><span class="nm">Info</span><span class="hx">#38bdf8</span></div>
    <div class="sw"><div class="chip" style="background:#fbbf24"></div><span class="nm">Gold</span><span class="hx">#fbbf24</span></div>
  </div>
</body></html>
