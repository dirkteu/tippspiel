<!DOCTYPE html>
<html lang="de"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg);padding:24px;font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px 28px}
  .row{display:flex;align-items:baseline;gap:12px}
  .name{font-family:var(--font-mono);font-size:12px;color:var(--fg3);width:64px}
  .val{font-family:var(--font-mono);font-size:12px;color:var(--fg4);margin-left:auto}
  .demo{color:var(--fg1);font-weight:500}
</style></head>
<body>
  <div class="grid">
    <div class="row"><span class="name">5xl</span><span class="demo" style="font-size:24px">Aa</span><span class="val">48</span></div>
    <div class="row"><span class="name">4xl</span><span class="demo" style="font-size:22px">Aa</span><span class="val">36</span></div>
    <div class="row"><span class="name">3xl</span><span class="demo" style="font-size:20px">Aa</span><span class="val">30</span></div>
    <div class="row"><span class="name">2xl</span><span class="demo" style="font-size:19px">Aa</span><span class="val">24</span></div>
    <div class="row"><span class="name">xl</span><span class="demo" style="font-size:18px">Aa</span><span class="val">20</span></div>
    <div class="row"><span class="name">lg</span><span class="demo" style="font-size:17px">Aa</span><span class="val">18</span></div>
    <div class="row"><span class="name">base</span><span class="demo" style="font-size:16px">Aa</span><span class="val">16</span></div>
    <div class="row"><span class="name">sm</span><span class="demo" style="font-size:15px">Aa</span><span class="val">15</span></div>
    <div class="row"><span class="name">xs</span><span class="demo" style="font-size:14px">Aa</span><span class="val">14</span></div>
  </div>
</body></html>
