<!DOCTYPE html>
<html lang="de"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg);padding:24px;font-family:var(--font-sans);display:flex;justify-content:center}
  .card{width:340px;background:var(--surface);border-radius:16px;padding:16px;
    box-shadow:var(--shadow-card);border:1px solid var(--border-soft)}
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .kicker{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--fg3)}
  .live{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--green-400)}
  .dot{width:7px;height:7px;border-radius:999px;background:var(--green-500);box-shadow:0 0 0 4px var(--green-tint)}
  .teams{display:flex;align-items:center;justify-content:space-between}
  .team{display:flex;flex-direction:column;align-items:center;gap:6px;width:84px}
  .flag{font-size:34px;line-height:1;font-family:var(--font-flag)}
  .tn{font-size:13px;color:var(--fg2);font-weight:500}
  .stepper{display:flex;align-items:center;gap:10px}
  .num{font-family:var(--font-display);font-weight:700;font-size:40px;color:var(--fg1);font-variant-numeric:tabular-nums;width:36px;text-align:center}
  .colon{font-family:var(--font-display);font-size:28px;color:var(--fg4)}
  .pm{display:flex;flex-direction:column;gap:6px}
  .b{width:30px;height:24px;border-radius:7px;background:var(--surface-2);color:var(--fg1);border:0;font-size:15px;cursor:pointer;line-height:1}
</style></head>
<body>
  <div class="card">
    <div class="top"><span class="kicker">Gruppe A · 12. Juni</span><span class="live"><span class="dot"></span>LIVE 67'</span></div>
    <div class="teams">
      <div class="team"><span class="flag">🇲🇽</span><span class="tn">Mexiko</span></div>
      <div class="stepper">
        <div class="pm"><button class="b">+</button><button class="b">−</button></div>
        <span class="num">2</span><span class="colon">:</span><span class="num">1</span>
        <div class="pm"><button class="b">+</button><button class="b">−</button></div>
      </div>
      <div class="team"><span class="flag">🇩🇪</span><span class="tn">Deutschland</span></div>
    </div>
  </div>
</body></html>
