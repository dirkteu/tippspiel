<!DOCTYPE html>
<html lang="de"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg);padding:24px;font-family:var(--font-sans);display:flex;gap:32px;align-items:center;justify-content:center}
  .card{display:flex;flex-direction:column;align-items:center;gap:10px}
  .grid{position:relative;width:120px;height:120px;border-radius:8px;overflow:hidden;
    background:linear-gradient(135deg,#1f6f4a,#0b3a26);
    display:grid;grid-template-columns:repeat(3,1fr);gap:1px}
  .grid::after{content:"⚽";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:54px;opacity:.55}
  .tile{background:var(--tile);position:relative;z-index:1;transition:opacity var(--dur-slow) var(--ease-out),transform var(--dur-slow) var(--ease-out)}
  .tile.open{opacity:0;transform:scale(.6);pointer-events:none}
  .cap{font-family:var(--font-mono);font-size:10px;color:var(--fg4)}
  .t-name{font-weight:500;color:var(--fg1);font-size:14px}
</style></head>
<body>
  <div class="card">
    <div class="grid">
      <div class="tile"></div><div class="tile"></div><div class="tile"></div>
      <div class="tile"></div><div class="tile"></div><div class="tile"></div>
      <div class="tile"></div><div class="tile"></div><div class="tile"></div>
    </div>
    <span class="cap">0 / 9 · verdeckt</span>
  </div>
  <div class="card">
    <div class="grid">
      <div class="tile open"></div><div class="tile"></div><div class="tile open"></div>
      <div class="tile"></div><div class="tile open"></div><div class="tile"></div>
      <div class="tile open"></div><div class="tile"></div><div class="tile"></div>
    </div>
    <span class="t-name">4 / 9 aufgedeckt</span>
  </div>
</body></html>
