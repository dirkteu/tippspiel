<!DOCTYPE html>
<html lang="de"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg);padding:24px;font-family:var(--font-sans)}
  .row{display:flex;align-items:center;gap:14px;padding:7px 0}
  .bar{height:16px;background:var(--accent);border-radius:3px;opacity:.9}
  .nm{font-family:var(--font-mono);font-size:11px;color:var(--fg3);width:96px}
  .px{font-family:var(--font-mono);font-size:11px;color:var(--fg4);margin-left:auto}
</style></head>
<body>
  <div class="row"><span class="nm">space-1</span><div class="bar" style="width:4px"></div><span class="px">4</span></div>
  <div class="row"><span class="nm">space-2</span><div class="bar" style="width:8px"></div><span class="px">8</span></div>
  <div class="row"><span class="nm">space-3 · gutter</span><div class="bar" style="width:12px"></div><span class="px">12</span></div>
  <div class="row"><span class="nm">space-4 · margin</span><div class="bar" style="width:16px"></div><span class="px">16</span></div>
  <div class="row"><span class="nm">space-6</span><div class="bar" style="width:24px"></div><span class="px">24</span></div>
  <div class="row"><span class="nm">space-8</span><div class="bar" style="width:32px"></div><span class="px">32</span></div>
  <div class="row"><span class="nm">space-12</span><div class="bar" style="width:48px"></div><span class="px">48</span></div>
</body></html>
