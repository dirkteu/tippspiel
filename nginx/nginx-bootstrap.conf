user nginx;
worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # Bootstrap-Config — nur HTTP, damit certbot per Webroot ACME-Challenge
  # bedienen kann. Sobald das Zertifikat liegt, auf nginx.conf umstellen.
  server {
    listen 80;
    server_name tipp.dirkteu.de;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 200 "Bootstrap-Modus — warte auf Zertifikat.\n";
      add_header Content-Type text/plain;
    }
  }
}
